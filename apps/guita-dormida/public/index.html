<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Guita Dormida — Wallbit Lab</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b0d10;
        color: #e7eaf0;
        padding: 2rem;
      }
      main {
        max-width: 560px;
      }
      h1 {
        font-size: 1.6rem;
        margin: 0 0 0.5rem;
      }
      p {
        line-height: 1.55;
        color: #a6adbb;
      }
      code {
        background: #16191f;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-size: 0.92em;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <p><span class="dot"></span>Servicio activo</p>
      <h1>Guita Dormida</h1>
      <p>
        Detector de capital ocioso construido sobre la API pública de Wallbit.
        Corre como cron diario en Vercel y reporta por Telegram.
      </p>
      <p>
        Endpoint: <code>/api/analyze</code> — protegido por
        <code>CRON_SECRET</code>.
      </p>
    </main>
  </body>
</html>
